name: verified-recap
# The morning after a show, posts exact song lengths from phish.in's recording.
# Exits quietly if there was no show or the recording isn't up yet.

on:
  schedule:
    - cron: '0 15 * * *'   # 11am ET
  workflow_dispatch:
    inputs:
      date:
        description: "Show date (YYYY-MM-DD); default = yesterday"
        required: false

concurrency:
  group: show-night   # share the state cache safely with the night job
  cancel-in-progress: false

jobs:
  recap:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4


      - run: python3 -m venv .venv && ./.venv/bin/pip install -r requirements.txt

      - name: Restore bot state
        uses: actions/cache/restore@v4
        with:
          path: botstate.db
          key: botstate-${{ github.run_id }}
          restore-keys: botstate-

      - name: Post verified lengths
        env:
          TRUTH_BEARER_TOKEN: ${{ secrets.TRUTH_BEARER_TOKEN }}
          PLATFORMS: truthsocial
          STATE_DB: botstate.db
        run: |
          SHOWDATE="${{ github.event.inputs.date }}"
          if [ -z "$SHOWDATE" ]; then SHOWDATE=$(./.venv/bin/python -c "from datetime import date,timedelta; print(date.today()-timedelta(days=1))"); fi
          ./.venv/bin/python main.py verified-recap --date "$SHOWDATE"

      - name: Save bot state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: botstate.db
          key: botstate-${{ github.run_id }}
