name: verified-recap
# The morning after a show, posts exact song lengths from phish.in's recording.
# Exits quietly if there was no show or the recording isn't up yet.
# Runs on the self-hosted WINDOWS runner — steps are PowerShell.

on:
  schedule:
    - cron: '0 15 * * *'   # 11am ET
  workflow_dispatch:
    inputs:
      date:
        description: "Show date (YYYY-MM-DD); default = yesterday"
        required: false

concurrency:
  group: show-night   # share the state cache safely with the night job
  cancel-in-progress: false

jobs:
  recap:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv\Scripts\pip install -r requirements.txt

      - name: Restore bot state
        uses: actions/cache/restore@v4
        with:
          path: botstate.db
          key: botstate-${{ github.run_id }}
          restore-keys: botstate-

      - name: Post verified lengths
        env:
          TRUTH_BEARER_TOKEN: ${{ secrets.TRUTH_BEARER_TOKEN }}
          PLATFORMS: truthsocial
          STATE_DB: botstate.db
        run: |
          $d = "${{ github.event.inputs.date }}"
          if (-not $d) { $d = (Get-Date).AddDays(-1).ToString("yyyy-MM-dd") }
          .venv\Scripts\python main.py verified-recap --date $d

      - name: Save bot state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: botstate.db
          key: botstate-${{ github.run_id }}
