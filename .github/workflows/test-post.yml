name: test-post
# Manual credentials check: sends ONE real post to Truth Social.

on:
  workflow_dispatch:
    inputs:
      text:
        description: "Text to post"
        default: "Testing, testing… soundcheck. 🎤"

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - env:
          TRUTH_BEARER_TOKEN: ${{ secrets.TRUTH_BEARER_TOKEN }}
        run: python main.py test-post "${{ github.event.inputs.text }}"
