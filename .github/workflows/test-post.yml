name: test-post
# Manual credentials check: sends ONE real post to Truth Social.

on:
  workflow_dispatch:
    inputs:
      text:
        description: "Text to post"
        default: "Testing, testing… soundcheck. 🎤"

jobs:
  post:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m venv .venv && ./.venv/bin/pip install -r requirements.txt
      - env:
          TRUTH_BEARER_TOKEN: ${{ secrets.TRUTH_BEARER_TOKEN }}
        run: ./.venv/bin/python main.py test-post "${{ github.event.inputs.text }}"
