name: test-post
# Manual credentials check / one-off post: sends ONE real post to Truth Social.
# Runs on the self-hosted WINDOWS runner — steps are PowerShell.

on:
  workflow_dispatch:
    inputs:
      text:
        description: "Text to post"
        default: "Testing, testing… soundcheck. 🎤"

jobs:
  post:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv\Scripts\pip install -r requirements.txt
      - env:
          TRUTH_BEARER_TOKEN: ${{ secrets.TRUTH_BEARER_TOKEN }}
        run: .venv\Scripts\python main.py test-post "${{ github.event.inputs.text }}"
