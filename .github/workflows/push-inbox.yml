name: push-inbox

# Applies changesets dropped into the shared Google Drive folder
# "setlist-bot-push-inbox" by Claude sessions (from phone, PC, or Mac).
# Runs on GitHub-hosted runners so it never queues behind show-night
# jobs on the self-hosted runner. See deploy/inbox_apply.py for the
# changeset format and safety rules.
#
# Also hosts the show-night WATCHDOG (added after GitHub's cron silently
# skipped the 6:30pm scheduled run on 7/22 MSG N1): on show dates, if no
# show-night run exists by 23:05 UTC (7:05pm EDT), it dispatches one.
# Piggybacks on this workflow's every-5-min cron, which fires ~288x/day
# and has proven reliable. Update SHOW_DATES for future tour legs.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: push-inbox
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure git identity
        run: |
          git config user.name "setlist-bot inbox"
          git config user.email "inbox@mikeside.com"

      - name: Apply pending changesets
        env:
          INBOX_FOLDER_ID: 1c_Kg5A_LMxVI55u6H2U1Z5mAg8NjwDaQ
          # Optional hardening: add a DRIVE_API_KEY repo secret and
          # uncomment to use the official Drive API for listing.
          # DRIVE_API_KEY: ${{ secrets.DRIVE_API_KEY }}
        run: python3 deploy/inbox_apply.py

  show-night-watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
    steps:
      - name: Dispatch show-night if the scheduled run was skipped
        env:
          GH_TOKEN: ${{ github.token }}
          # MSG summer 2026 run. Dates are EASTERN show dates.
          SHOW_DATES: "2026-07-22 2026-07-24 2026-07-25 2026-07-27 2026-07-29"
        run: |
          set -euo pipefail
          today=$(TZ=America/New_York date +%F)
          now=$(date -u +%H%M)
          case " $SHOW_DATES " in
            *" $today "*) ;;
            *) echo "Not a show date ($today) - nothing to do"; exit 0 ;;
          esac
          # show-night cron is 22:30 UTC; give GitHub 35 min for a late
          # (vs skipped) event. After midnight UTC $now compares low and
          # we exit here too, which is what we want - no 1am dispatches.
          if [ "$now" -lt 2305 ]; then
            echo "$now UTC: inside cron grace window - not checking yet"
            exit 0
          fi
          since="${today}T22:00:00Z"
          count=$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/show-night.yml/runs?per_page=20" \
            --jq "[.workflow_runs[] | select(.created_at >= \"$since\")] | length")
          if [ "$count" -gt 0 ]; then
            echo "show-night has $count run(s) tonight - all good"
            exit 0
          fi
          echo "NO show-night run tonight - cron was skipped. Dispatching..."
          gh api -X POST \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/show-night.yml/dispatches" \
            -f ref=main
          echo "Dispatched show-night on main with default inputs."
